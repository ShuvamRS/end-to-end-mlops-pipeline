apiVersion: apps/v1
kind: Deployment
metadata:
  name: celestial-bodies-classifier-deployment
  labels:
    app: celestial-bodies-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celestial-bodies-classifier
  template:
    metadata:
      labels:
        app: celestial-bodies-classifier
    spec:
      containers:
        - name: celestial-bodies-classifier
          image: 056449379215.dkr.ecr.us-west-2.amazonaws.com/celestial-bodies-classifier:latest
          ports:
            - containerPort: 3000
